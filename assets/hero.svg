<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" role="img" aria-labelledby="title desc">
  <title id="title">X Insight Cards</title>
  <desc id="desc">Discover, verify, score, translate, render.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#10213a"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1280" height="480" rx="30" fill="url(#bg)"/>
  <circle cx="1120" cy="80" r="170" fill="#38bdf8" opacity="0.08"/>
  <circle cx="120" cy="430" r="210" fill="#22c55e" opacity="0.07"/>
  <g transform="translate(76 74)">
    <rect width="88" height="88" rx="22" fill="url(#accent)"/>
    <text x="44" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#07111f">XI</text>
  </g>
  <text x="188" y="124" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#7dd3fc" letter-spacing="3">CODEX SKILL + PYTHON</text>
  <text x="76" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#fff">X Insight Cards</text>
  <text x="78" y="276" font-family="Arial, sans-serif" font-size="27" fill="#cbd5e1">High-signal posts → verified bilingual creator assets</text>
  <g transform="translate(78 336)" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#e2e8f0">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="156" height="58" rx="16" fill="#132a46" stroke="#275175"/>
      <rect x="180" y="0" width="156" height="58" rx="16" fill="#132a46" stroke="#275175"/>
      <rect x="360" y="0" width="156" height="58" rx="16" fill="#132a46" stroke="#275175"/>
      <rect x="540" y="0" width="156" height="58" rx="16" fill="#132a46" stroke="#275175"/>
      <rect x="720" y="0" width="156" height="58" rx="16" fill="#132a46" stroke="#275175"/>
      <rect x="900" y="0" width="156" height="58" rx="16" fill="#123c3b" stroke="#22c55e"/>
    </g>
    <text x="78" y="37" text-anchor="middle">Discover</text>
    <text x="258" y="37" text-anchor="middle">Verify</text>
    <text x="438" y="37" text-anchor="middle">Score</text>
    <text x="618" y="37" text-anchor="middle">Translate</text>
    <text x="798" y="37" text-anchor="middle">Render</text>
