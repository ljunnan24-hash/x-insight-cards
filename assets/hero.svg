    <text x="168" y="35" text-anchor="middle" font-size="25" font-weight="700">9,635 plays</text>
    <text x="168" y="65" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="19" fill="#bae6fd">抖音单条播放</text>
    <text x="528" y="35" text-anchor="middle" font-size="23" font-weight="700">1,591 total likes</text>
