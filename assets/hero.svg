  </g>
  <text x="188" y="124" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#7dd3fc" letter-spacing="3">X-TO-SOCIAL CODEX SKILL</text>
  <text x="76" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#fff">X Insight Cards</text>
