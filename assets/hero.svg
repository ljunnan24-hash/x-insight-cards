  </defs>
  <rect width="1280" height="480" rx="30" fill="url(#bg)"/>
  <circle cx="1120" cy="80" r="170" fill="#38bdf8" opacity="0.08"/>
  <circle cx="120" cy="430" r="210" fill="#22c55e" opacity="0.07"/>
